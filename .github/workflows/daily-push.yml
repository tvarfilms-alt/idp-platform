name: Daily mood push

# ВАЖНО: запланированные (schedule) workflow в GitHub запускаются ТОЛЬКО из
# файла на ветке по умолчанию (обычно master/main). Пока этот файл живёт только
# на feature-ветке, авто-отправка не сработает — смотри README, как активировать.
on:
  schedule:
    # Каждые 15 минут. Скрипт сам шлёт push только тем, у кого СЕЙЧАС наступило
    # их личное время напоминания (в их часовом поясе). Время каждый выбирает
    # в приложении (⚙️ Настройки → Время напоминания).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # позволяет запустить вручную кнопкой для проверки

concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: push
        run: npm install --no-audit --no-fund
      - name: Send push
        working-directory: push
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node send.js

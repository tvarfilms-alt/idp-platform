name: IDP Compute

on:
  schedule:
    # L2 + Bonds: weekdays at 18:00 UTC (21:00 MSK) -- after ETL
    - cron: '0 18 * * 1-5'
    # L1: 1st of each month at 07:00 UTC (10:00 MSK)
    - cron: '0 7 1 * *'
    # L3: Monday at 05:00 UTC (08:00 MSK)
    - cron: '0 5 * * 1'

  workflow_dispatch:
    inputs:
      level:
        description: 'Which compute level to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - l1
          - l2
          - l3
          - bonds
      target_date:
        description: 'Target date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  FM_API_TOKEN: ${{ secrets.FM_API_TOKEN }}

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compute
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Determine level and date
        id: params
        run: |
          LEVEL="${{ github.event.inputs.level || 'all' }}"
          TARGET="${{ github.event.inputs.target_date || '' }}"
          echo "level=$LEVEL" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Running compute: level=$LEVEL target=$TARGET"

      - name: Run compute
        run: |
          LEVEL="${{ steps.params.outputs.level }}"
          TARGET="${{ steps.params.outputs.target }}"
          if [ -n "$TARGET" ]; then
            python run_compute.py "$LEVEL" "$TARGET"
          else
            python run_compute.py "$LEVEL"
          fi

      - name: Run bonds (after L2)
        if: steps.params.outputs.level == 'all' || steps.params.outputs.level == 'bonds'
        run: echo "Bonds computed as part of run_compute.py"

      - name: Export data.json
        run: python export_json.py ../data.json

      - name: Commit data.json to repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd $GITHUB_WORKSPACE
          ls -la data.json || echo "data.json NOT FOUND in workspace root"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git status
          git diff --staged --quiet || git commit -m "auto: update data.json [skip ci]"
          git push https://x-access-token:${GH_TOKEN}@github.com/tvarfilms-alt/idp-platform.git HEAD:master

      # Quality checks + alerts
      - name: Run quality checks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python quality_check.py
        continue-on-error: true

name: IDP Daily ETL

on:
  schedule:
    # MOEX + CBR: weekdays at 16:30 UTC (19:30 MSK) — after market close
    - cron: '30 16 * * 1-5'
    # FM fundamentals: Monday at 05:30 UTC (08:30 MSK)
    - cron: '30 5 * * 1'

  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - moex
          - cbr
          - fm

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  FM_API_TOKEN: ${{ secrets.FM_API_TOKEN }}

jobs:
  fetch-moex:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'moex'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch MOEX daily data
        run: python fetch_moex_daily.py

  fetch-cbr:
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'cbr'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch CBR rates
        run: python fetch_cbr_rates.py

  fetch-fm:
    # Fundamentals: weekly on Monday only, or manual trigger
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '30 5 * * 1') ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'fm'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Finance Marker fundamentals
        run: python fetch_fm_fundamentals.py
